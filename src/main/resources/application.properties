spring.application.name=gestorCamiones

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gestor_camionesMP}?stringtype=unspecified
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Javi.123}

#
# Hibernate NO debe intentar "migrar" la BD (update) porque eso vuelve impredecible el esquema.
# Con Flyway, el esquema se versiona en SQL. Se usa 'none' en vez de 'validate' para
# evitar errores estrictos de tipos entre SERIAL (int4) de PostgreSQL y Long de Java.
#
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#
# Flyway (migraciones)
# - En una BD nueva: ejecuta V1__*.sql, luego V2__*.sql, etc.
# - En una BD existente (ya creada "a mano"): baseline-on-migrate crea el historial sin tocar tablas y
#   desde ahi aplicas V2, V3... (ojo: debes alinear el baseline con la version real del esquema).
#
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=8080

# Uploads (evidencias)
# Ruta local donde se guardan archivos subidos. Se expone como /uploads/**.
app.upload.dir=uploads

# Backups
app.backup.base-dir=backups
app.backup.external-dir=C:/GestorCamiones/backups_externos
app.backup.drive-dir=C:/GestorCamiones/backups_drive
app.backup.pg-dump-path=C:/Program Files/PostgreSQL/18/bin/pg_dump.exe
app.backup.pg-restore-path=C:/Program Files/PostgreSQL/18/bin/pg_restore.exe
app.backup.encryption-key=${BACKUP_ENCRYPTION_KEY:GestorCamionesBackupKey-ChangeMe}
app.backup.retention-days=30
app.backup.drive.enabled=${BACKUP_DRIVE_ENABLED:true}
app.backup.drive.credentials-file=${BACKUP_DRIVE_CREDENTIALS_FILE:C:/GestorCamiones/credentials/google-drive.json}
app.backup.drive.folder-id=${BACKUP_DRIVE_FOLDER_ID:1DxBnp0hgfefIQKj3RBzMzXAfmFY57oZj}
