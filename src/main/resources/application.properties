spring.application.name=gestorCamiones

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gestor_camionesMP}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Javi.123}

#
# Hibernate NO debe intentar "migrar" la BD (update) porque eso vuelve impredecible el esquema.
# Con Flyway, el esquema se versiona en SQL y Hibernate solo valida que coincida.
#
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#
# Flyway (migraciones)
# - En una BD nueva: ejecuta V1__*.sql, luego V2__*.sql, etc.
# - En una BD existente (ya creada "a mano"): baseline-on-migrate crea el historial sin tocar tablas y
#   desde ahi aplicas V2, V3... (ojo: debes alinear el baseline con la version real del esquema).
#
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=8080
