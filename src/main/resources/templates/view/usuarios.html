<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <title>Usuarios</title>
    <th:block th:replace="fragments/assets :: globalStyles"></th:block>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">
    <div class="container">
        <div class="page-surface">

            <!-- Franja naranja decorativa -->
            <div class="mp-stripe"></div>

            <!-- Toolbar -->
            <div class="mp-toolbar">
                <div class="row align-items-center g-2">
                    <div class="col-12 col-md-2">
                        <h5 class="mp-title">Usuarios</h5>
                    </div>

                    <div class="col-12 col-md-4 mp-search">
                        <div class="input-group">
                            <span class="input-group-text">Buscar</span>
                            <input id="filtroBusquedaUsuarios" type="text" class="form-control" placeholder="Buscar nombre, apellido o correo...">
                        </div>
                    </div>

                    <!-- Filtro por estado (select independiente) -->
                    <div class="col-12 col-md-3">
                        <select id="filtroEstadoUsuarios" class="form-select mp-select">
                            <option value="" selected>Todos los estados</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-3 d-grid">
                        <button class="btn btn-add" data-bs-toggle="modal" data-bs-target="#modalAgregarUsuario">
                            + Agregar usuario
                        </button>
                    </div>
                </div>
            </div>

            <!-- Modal Agregar Usuario - VERSIÓN MÁS ANCHA -->
            <div class="modal fade" id="modalAgregarUsuario" tabindex="-1" aria-labelledby="modalAgregarUsuarioLabel" aria-hidden="true">
                <div class="modal-dialog modal-xl modal-dialog-centered">  <!-- Cambiado de modal-lg a modal-xl -->
                    <div class="modal-content mp-modal-content">
                        <div class="modal-header mp-modal-header">
                            <h5 class="modal-title" id="modalAgregarUsuarioLabel">Agregar Usuario</h5>
                            <button type="button" class="btn-close mp-modal-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>

                        <div class="modal-body">
                            <form id="formAgregarUsuario" class="row g-4">
                                <input type="hidden" id="usuarioLogin" name="usuarioLogin">
                                <!-- ═════ DATOS PERSONALES Y ACCESO EN LA MISMA FILA ═════ -->
                                <div class="col-md-8">
                                    <div class="row g-3">
                                        <!-- Título dentro de la columna -->
                                        <div class="col-12">
                                            <h6 class="mp-title-sm mb-2">Datos Personales</h6>
                                            <hr class="mt-0">
                                        </div>

                                        <!-- Primera fila - 3 columnas -->
                                        <div class="col-md-4">
                                            <label for="nombre" class="form-label">Nombre *</label>
                                            <input type="text" class="form-control mp-modal-input"
                                                   id="nombre" name="nombre"
                                                   placeholder="José" required>
                                        </div>

                                        <div class="col-md-4">
                                            <label for="apellido" class="form-label">Apellido *</label>
                                            <input type="text" class="form-control mp-modal-input"
                                                   id="apellido" name="apellido"
                                                   placeholder="Pérez" required>
                                        </div>

                                        <div class="col-md-4">
                                            <label for="telefono" class="form-label">Teléfono *</label>
                                            <input type="tel" class="form-control mp-modal-input"
                                                   id="telefono" name="telefono"
                                                   placeholder="7123-4567" required>
                                        </div>

                                        <!-- Segunda fila - 3 columnas -->
                                        <div class="col-md-4">
                                            <label for="dui" class="form-label">DUI *</label>
                                            <input type="text" class="form-control mp-modal-input"
                                                   id="dui" name="dui"
                                                   placeholder="00000000-0" required>
                                        </div>

                                        <div class="col-md-8">
                                            <label for="email" class="form-label">Correo *</label>
                                            <input type="email" class="form-control mp-modal-input"
                                                   id="email" name="email"
                                                   placeholder="usuario@empresa.com" required>
                                        </div>

                                        <!-- V2: la contraseña se genera automaticamente (no se captura en el formulario). -->

                                        <!-- Título Configuración -->
                                        <div class="col-12 mt-2">
                                            <h6 class="mp-title-sm mb-2">Configuración</h6>
                                            <hr class="mt-0">
                                        </div>

                                        <!-- Tercera fila - 3 columnas -->
                                        <div class="col-md-6">
                                            <label for="estadoEmpleado" class="form-label">Estado *</label>
                                            <select id="estadoEmpleado" name="estadoEmpleado"
                                                    class="form-select mp-modal-input" required>
                                                <option value="" disabled selected>Selecciona</option>
                                            </select>
                                        </div>

                                        <div class="col-md-6">
                                            <label for="rol" class="form-label">Rol *</label>
                                            <select id="rol" name="rol"
                                                    class="form-select mp-modal-input" required>
                                                <option value="" disabled selected>Selecciona</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <!-- ═════ COLUMNA DERECHA - FOTO ═════ -->
                                <div class="col-md-4">
                                    <div class="sticky-top" style="top: 20px;">
                                        <label class="form-label">Foto del usuario</label>
                                        <div class="border rounded p-3 text-center">
                                            <img id="usuarioImagen"
                                                 src="https://via.placeholder.com/400x200?text=Sin+Imagen"
                                                 alt="Foto del usuario"
                                                 class="img-fluid rounded"
                                                 style="max-height: 180px; width: 100%; object-fit: cover;">
                                            <div class="mt-3">
                                                <button type="button" class="btn btn-sm btn-primary w-100"
                                                        onclick="document.getElementById('fileInput').click();">
                                                    <i class="bi bi-upload"></i> Subir foto
                                                </button>
                                                <input type="file" id="fileInput" class="d-none" accept="image/*">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div class="modal-footer mp-modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button id="btnResetPassword" type="button" class="btn btn-outline-warning d-none" sec:authorize="hasRole('ADMIN')">Actualizar contraseña</button>
                            <button id="btnSubmitUsuarioModal" type="submit" form="formAgregarUsuario" class="btn btn-add" sec:authorize="hasRole('ADMIN')">
                                Guardar Usuario
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de Usuarios -->
            <div class="table-responsive">
                <table class="table mp-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>DUI</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaUsuarios">
                    <!-- Los datos se cargan dinámicamente -->
                    <tr>
                        <td colspan="8" class="text-center">Cargando usuarios...</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Footer -->
            <div class="mp-table-footer d-flex flex-wrap justify-content-between align-items-center gap-2">
                <span id="totalUsuarios">Mostrando 0 usuarios</span>
                <div class="d-flex align-items-center gap-2">
                    <label for="tamanoPaginaUsuarios" class="mb-0">Por pagina</label>
                    <select id="tamanoPaginaUsuarios" class="form-select form-select-sm" style="width: 90px;">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                    </select>
                </div>
                <nav aria-label="Paginacion de usuarios">
                    <ul id="paginacionUsuarios" class="pagination pagination-sm mb-0">
                        <li class="page-item disabled">
                            <button id="btnPrevUsuarios" class="page-link" type="button">Anterior</button>
                        </li>
                        <li class="page-item disabled">
                            <span id="paginaActualUsuarios" class="page-link">1 / 1</span>
                        </li>
                        <li class="page-item disabled">
                            <button id="btnNextUsuarios" class="page-link" type="button">Siguiente</button>
                        </li>
                    </ul>
                </nav>
            </div>

        </div>
    </div>
</div>

<th:block th:replace="fragments/assets :: globalScripts"></th:block>
<script src="/js/usuario.js"></script>
</body>
</html>
