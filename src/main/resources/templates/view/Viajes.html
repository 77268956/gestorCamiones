<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viajes</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <th:block th:replace="fragments/assets :: globalStyles"></th:block>

    <style>
        /* ── LAYOUT GENERAL ── */
        body { background: var(--mp-gray-bg); }

        /* ══════════════════════════════
           SKELETON / LOADING STATES
        ══════════════════════════════ */
        @keyframes skeletonShimmer {
            0%   { background-position: -600px 0; }
            100% { background-position:  600px 0; }
        }
        .skeleton {
            border-radius: 6px;
            background: linear-gradient(90deg,
                rgba(26,58,143,.07) 25%,
                rgba(26,58,143,.15) 50%,
                rgba(26,58,143,.07) 75%);
            background-size: 600px 100%;
            animation: skeletonShimmer 1.4s ease-in-out infinite;
            display: inline-block;
        }
        .skeleton-block { display: block; width: 100%; height: 14px; margin-bottom: 6px; }
        .skeleton-w-50  { width: 50% !important; }
        .skeleton-w-70  { width: 70% !important; }
        .skeleton-w-30  { width: 30% !important; }

        /* Skeleton metric */
        .skeleton-metric {
            background: linear-gradient(135deg, rgba(26,58,143,.12), rgba(26,58,143,.2));
            border-radius: 10px;
            padding: 12px;
            height: 72px;
        }

        /* Skeleton vcard */
        .skeleton-vcard {
            background: var(--mp-white);
            border: 2px solid rgba(26,58,143,.1);
            border-radius: 20px;
            overflow: hidden;
        }
        .skeleton-vcard-header {
            background: linear-gradient(135deg, rgba(26,58,143,.18), rgba(30,58,138,.25));
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .skeleton-vcard-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .skeleton-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Disable overlay on btn while loading */
        .btn-loading {
            position: relative;
            pointer-events: none;
            opacity: .75;
        }
        .btn-loading::after {
            content: "";
            position: absolute;
            width: 14px; height: 14px;
            top: 50%; left: 50%;
            margin: -7px 0 0 -7px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal spinner */
        .mp-modal-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            min-height: 200px;
            color: var(--mp-blue-dark);
        }
        .mp-modal-spinner-ring {
            width: 48px; height: 48px;
            border: 4px solid rgba(26,58,143,.15);
            border-top-color: var(--mp-blue);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        .mp-modal-spinner-text { font-size: .9rem; font-weight: 600; opacity: .75; }
        .page-header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:20px;
            flex-wrap: wrap;
        }
        .page-title { font-size:1.5rem; font-weight:700; color:var(--mp-blue-dark); }

        .card-clean { background:var(--mp-white); border-radius:12px; padding:16px; border:1px solid var(--mp-border); box-shadow:0 6px 16px rgba(15,36,96,.08); }

        /* ── METRICS ── */
        .metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
        .metric  { background:linear-gradient(135deg,var(--mp-blue),var(--mp-blue-light)); color:var(--mp-white); padding:12px; border-radius:10px; box-shadow:0 6px 14px rgba(26,58,143,.15); }
        .metric-val { font-size:1.2rem; font-weight:700; }
        .metric small { opacity:.85; display:block; font-size:.8rem; }

        /* ── FILTERS ── */
        .filters         { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; align-items:end; }
        .filters-actions { display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }

        /* ── LISTA DE VIAJES ── */
        .trip-list { display:flex; flex-direction:column; gap:20px; margin-top:18px; }

        /* ── VCARD (contenedor de un viaje) ── */
        .vcard {
            background:var(--mp-white);
            border:2px solid rgba(26,58,143,.18);
            border-radius:20px;
            box-shadow:0 4px 18px rgba(15,36,96,.09);
            overflow:hidden;
            transition:box-shadow .18s ease, transform .18s ease;
        }
        .vcard:hover { box-shadow:0 10px 30px rgba(26,58,143,.14); transform:translateY(-2px); }

        /* ── VCARD HEADER ── */
        .vcard-header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:10px 18px;
            background:linear-gradient(135deg,var(--mp-blue-dark) 0%,#1e3a8a 100%);
            gap:12px;
            flex-wrap: wrap;
            cursor: pointer;
        }
        .vcard-title-group { display:flex; flex-direction:column; gap:2px; flex: 1; min-width: 200px; }
        .vcard-id   { font-size:.7rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,.6); }
        .vcard-name { font-size:1.1rem; font-weight:800; color:#fff; margin:0; line-height:1.1; }
        
        /* Contenedor de estado en el header (visible cuando está colapsado) */
        .vcard-header-status-group {
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateX(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none; /* No click */
        }
        
        .vcard.is-collapsed .vcard-header-status-group {
            opacity: 1;
            transform: translateX(0);
        }
        
        .vcard-header-truck {
            color: rgba(255,255,255,0.85);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .vcard-header-actions { display:flex; gap:6px; flex-wrap:wrap; }
        .vcard-header-actions button { color:#fff; border-color:rgba(255,255,255,.4); }
        .vcard-header-actions button:hover { background:rgba(255,255,255,.18); border-color:#fff; }
        
        .vcard-header {
            cursor: pointer;
        }

        .vcard-toggle-btn {
            background: transparent;
            border: none;
            color: #fff;
            padding: 4px;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .vcard-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .vcard-toggle-icon {
            transition: transform 0.3s ease;
        }

        .vcard.is-collapsed .vcard-toggle-icon {
            transform: rotate(180deg);
        }

        /* Body: tramos a la izquierda, stats a la derecha */
        .vcard-body { 
            display:grid; grid-template-columns:1fr 210px; 
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, padding 0.3s ease-out;
            max-height: 1000px; /* Suficientemente grande para el contenido */
            opacity: 1;
        }
        
        .vcard.is-collapsed .vcard-body {
            max-height: 0;
            opacity: 0;
            margin: 0;
            border-top: none;
        }

        /* ── TRAMO ROW (layout horizontal) ── */
        .tleg-card {
            display:grid;
            grid-template-columns: 76px 150px 1fr 165px 115px 90px;
            gap:10px;
            align-items:center;
            padding:12px 16px;
            border-bottom:1px solid rgba(26,58,143,.07);
            border-left:4px solid transparent;
            cursor:pointer;
            transition:background .14s ease;
            position:relative;
        }
        .tleg-card:last-child { border-bottom:none; }
        .tleg-card:hover { background:rgba(37,99,235,.03); }
        .tleg-card.tleg-ida    { border-left-color:#2563eb; }
        .tleg-card.tleg-vuelta { border-left-color:#7c3aed; }

        /* Badge ida/vuelta */
        .tleg-indicator {
            display:inline-flex; align-items:center; gap:5px;
            font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;
            padding:3px 10px; border-radius:999px; color:#fff; white-space:nowrap;
        }
        .tleg-ind-ida    { background:linear-gradient(135deg,#2563eb,#1d4ed8); }
        .tleg-ind-vuelta { background:linear-gradient(135deg,#7c3aed,#6d28d9); }

        /* Columna camión/chofer */
        .tleg-col-vehicle { font-size:.82rem; min-width:0; }
        .tleg-sub { font-size:.7rem; color:#9ca3af; }
        .tleg-val { font-weight:600; color:var(--mp-blue-dark); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        /* Columna ruta + fechas */
        .tleg-col-route  { min-width:0; }
        .tleg-route-line { font-size:.9rem; font-weight:700; color:var(--mp-blue-dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tleg-dates      { font-size:.72rem; color:#6b7280; margin-top:2px; }

        /* Columna gasto/ganancia + status */
        .tleg-col-finance { font-size:.82rem; display:flex; flex-direction:column; gap:3px; }
        .tleg-fin-row     { display:flex; justify-content:space-between; gap:8px; }
        .tleg-fin-label   { color:#9ca3af; }
        .tleg-fin-val     { font-weight:700; }

        /* Columna toggles */
        .tleg-col-toggles { display:flex; flex-direction:column; gap:5px; }

        /* Toggle buttons */
        .tleg-toggle-btn {
            display:inline-flex; align-items:center; gap:5px;
            padding:3px 10px; border-radius:999px; border:1.5px solid transparent;
            font-size:.78rem; font-weight:700; cursor:pointer; white-space:nowrap;
            transition:background .15s, border-color .15s, transform .1s;
        }
        .tleg-toggle-btn:active   { transform:scale(.95); }
        .tleg-toggle-btn:disabled { opacity:.6; cursor:wait; }
        .tleg-toggle-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

        .tleg-toggle-off              { background:#f1f5f9; border-color:#cbd5e1; color:#64748b; }
        .tleg-toggle-off .tleg-toggle-dot { background:#94a3b8; }
        .tleg-toggle-on               { background:rgba(22,163,74,.1); border-color:#16a34a; color:#15803d; }
        .tleg-toggle-on .tleg-toggle-dot  { background:#16a34a; }
        .tleg-toggle-iva-on           { background:rgba(217,119,6,.1); border-color:#d97706; color:#b45309; }
        .tleg-toggle-iva-on .tleg-toggle-dot { background:#d97706; }

        /* Status badges */
        .status-badge {
            display:inline-flex; align-items:center;
            padding:1px 8px; border-radius:999px;
            font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
            color:#fff; white-space:nowrap;
        }
        .status-cargando    { background:#f59e0b; }
        .status-en_camino   { background:#2563eb; }
        .status-descargando { background:#7c3aed; }
        .status-con_fallas  { background:#ef4444; }
        .status-cancelado   { background:#6b7280; }
        .status-completado  { background:#16a34a; }

        /* Hint editar */
        .tleg-edit-hint {
            font-size:.7rem; color:rgba(26,58,143,.3); font-weight:600;
            text-align:right; pointer-events:none; transition:color .15s;
        }
        .tleg-card:hover .tleg-edit-hint { color:rgba(26,58,143,.65); }

        /* Empty state */
        .tleg-empty { display:flex; align-items:center; gap:10px; padding:18px 16px; color:#9ca3af; font-size:.88rem; font-style:italic; }
        .tleg-empty-icon { font-size:1.3rem; opacity:.4; }

        /* ── PANEL ESTADÍSTICAS ── */
        .vcard-stats {
            padding:14px 16px;
            background:rgba(26,58,143,.02);
            border-left:1px solid rgba(26,58,143,.1);
            cursor:pointer; transition:background .14s;
            display:flex; flex-direction:column; gap:5px;
        }
        .vcard-stats:hover { background:rgba(26,58,143,.06); }

        .vcard-stats-header {
            font-size:.75rem; font-weight:800; text-transform:uppercase; letter-spacing:.9px;
            color:var(--mp-blue-dark); margin-bottom:4px; padding-bottom:6px;
            border-bottom:1px solid rgba(26,58,143,.12);
        }
        .vcard-stat-row     { display:flex; justify-content:space-between; align-items:center; font-size:.82rem; gap:8px; }
        .vcard-stat-label   { color:#6b7280; white-space:nowrap; }
        .vcard-stat-val     { font-weight:700; color:var(--mp-blue-dark); text-align:right; }
        .vcard-stat-divider { height:1px; background:rgba(26,58,143,.1); margin:3px 0; }
        .vcard-stat-ganancia .vcard-stat-label { font-weight:700; color:var(--mp-blue-dark); }
        .vcard-stats-hint   { font-size:.7rem; color:rgba(26,58,143,.35); font-weight:600; margin-top:auto; padding-top:8px; text-align:center; }
        .vcard-stats:hover .vcard-stats-hint { color:var(--mp-blue); }

        /* ── MODAL DETALLE ── */
        .mp-modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:1050; padding:10px; }
        .mp-modal.is-open { display:flex; }
        .mp-modal-backdrop { position:absolute; inset:0; background:rgba(15,36,96,.45); }
        .mp-modal-content {
            position:relative; width:min(1300px,98vw); max-height:95vh;
            background:var(--mp-white); border-radius:16px;
            box-shadow:0 18px 40px rgba(15,36,96,.25);
            display:flex; flex-direction:column; overflow:hidden;
        }
        .mp-modal-header { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; background:var(--mp-blue-dark); color:var(--mp-white); gap:10px; flex-wrap:wrap; }
        .mp-modal-title  { font-weight:700; letter-spacing:.4px; }
        .mp-modal-close  { background:transparent; border:none; color:var(--mp-white); font-size:1.2rem; flex-shrink:0; }
        .mp-modal-body   { padding:20px; overflow:auto; }

        /* ══════════════════════════════════
           BREAKPOINTS RESPONSIVOS
        ══════════════════════════════════ */

        /* Tablet grande / Desktop pequeño (≤1150px) */
        @media (max-width:1150px) {
            .tleg-card { grid-template-columns: 76px 140px 1fr 155px 115px; }
            .tleg-edit-hint { display:none; }
        }

        /* Tablet / Laptop (≤900px) */
        @media (max-width:900px) {
            .vcard-body { grid-template-columns:1fr; }
            .vcard-stats { border-left:none; border-top:1px solid rgba(26,58,143,.1); }
            .tleg-card { grid-template-columns: 70px 1fr 130px 100px; gap:8px; }
            .tleg-edit-hint { display:none; }
        }

        /* Tablet pequeña (≤768px) */
        @media (max-width:768px) {
            .container { padding-left:12px; padding-right:12px; }
            .page-title { font-size:1.25rem; }
            .metrics { grid-template-columns: repeat(3,1fr); gap:8px; }
            .metric { padding:10px 8px; }
            .filters { grid-template-columns: 1fr 1fr; gap:8px; }
            .filters-actions { grid-column: 1 / -1; justify-content:flex-start; }

            /* Tramos en tablet: 2 columnas */
            .tleg-card {
                grid-template-columns: auto 1fr;
                row-gap:6px;
                column-gap:10px;
                padding:10px 12px;
            }
            .tleg-col-finance { grid-column:1 / -1; flex-direction:row; flex-wrap:wrap; gap:6px; }
            .tleg-col-toggles { grid-column:1 / -1; flex-direction:row; flex-wrap:wrap; gap:6px; }
        }

        /* Móvil (≤576px) */
        @media (max-width:576px) {
            .page-header { gap:8px; }
            .page-title  { font-size:1.1rem; }
            .metrics { grid-template-columns: 1fr 1fr; gap:8px; }
            .metric-val { font-size:1rem; }
            .filters { grid-template-columns: 1fr; }
            .filters-actions { grid-column: 1; justify-content:flex-start; }

            .vcard-header { padding:10px 12px; }
            .vcard-name   { font-size:.95rem; }
            .vcard-header-actions { width:100%; justify-content:flex-end; }
            .vcard-header-actions button { font-size:.75rem; padding:3px 8px; }

            .tleg-card { grid-template-columns:1fr; row-gap:6px; padding:10px 12px; }
            .tleg-col-finance { flex-direction:row; flex-wrap:wrap; }
            .tleg-col-toggles { flex-direction:row; flex-wrap:wrap; }
            .tleg-toggle-btn { font-size:.72rem; padding:2px 8px; }

            .mp-modal-body   { padding:12px; }
            .mp-modal-header { padding:10px 14px; }
            .mp-modal-content { border-radius:12px; }
        }

        /* Móvil muy pequeño (≤380px) */
        @media (max-width:380px) {
            .metrics { grid-template-columns: 1fr; }
            .page-header { flex-direction:column; align-items:flex-start; }
            .btn-add { width:100%; text-align:center; }
        }

        /* Paginación en móvil */
        @media (max-width:600px) {
            .mp-table-footer { flex-direction:column; align-items:flex-start; gap:8px; }
        }
    </style>

</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    <div class="page-header">
        <div class="page-title">Gestión de viajes</div>
        <button id="btnNuevoViaje" class="btn btn-add">+ Nuevo viaje</button>
    </div>

    <div class="metrics">
        <div class="metric">
            <div id="metricGastos" class="metric-val">$0.00</div>
            <small>Gastos totales</small>
        </div>
        <div class="metric">
            <div id="metricActivos" class="metric-val">0</div>
            <small>Tramos activos</small>
        </div>
        <div class="metric">
            <div id="metricLotes" class="metric-val">0</div>
            <small>Lotes en tránsito</small>
        </div>
    </div>

    <div class="card-clean">
        <div class="filters">
            <div>
                <label class="form-label">Buscar</label>
                <input id="filtroBusquedaViajes" type="text" class="form-control" placeholder="Cliente, viaje o admin...">
            </div>
            <div>
                <label class="form-label">Desde</label>
                <input id="filtroFechaInicioViajes" type="date" class="form-control">
            </div>
            <div>
                <label class="form-label">Hasta</label>
                <input id="filtroFechaFinViajes" type="date" class="form-control">
            </div>
            <div>
                <label class="form-label">Estado</label>
                <select id="filtroEstadoViajes" class="form-select">
                    <option value="" selected>Todos los estados</option>
                </select>
            </div>
            <div class="filters-actions">
                <button id="btnAplicarFiltrosViajes" type="button" class="btn btn-primary">Aplicar</button>
                <button id="btnLimpiarFiltrosViajes" type="button" class="btn btn-outline-secondary">Limpiar</button>
            </div>
        </div>
    </div>

    <div id="listaViajes" class="trip-list">
        <div class="text-center py-4 text-muted">Cargando viajes...</div>
    </div>

    <div class="mp-table-footer d-flex flex-wrap justify-content-between align-items-center gap-2 mt-3">
        <span id="totalViajes">Mostrando 0 viajes</span>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <label for="tamanoPaginaViajes" class="mb-0">Por página:</label>
            <select id="tamanoPaginaViajes" class="form-select form-select-sm" style="width: 80px;">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
            </select>
        </div>
        <nav aria-label="Paginacion de viajes">
            <ul id="paginacionViajes" class="pagination pagination-sm mb-0">
                <li class="page-item disabled">
                    <button id="btnPrevViajes" class="page-link" type="button">&#8249; Ant.</button>
                </li>
                <li class="page-item disabled">
                    <span id="paginaActualViajes" class="page-link">1 / 1</span>
                </li>
                <li class="page-item disabled">
                    <button id="btnNextViajes" class="page-link" type="button">Sig. &#8250;</button>
                </li>
            </ul>
        </nav>
    </div>

    <!-- El formulario de agregar/editar viaje ha sido trasladado a su propia vista /viajes/formulario -->
    <div id="viajeViewModal" class="mp-modal">
        <div class="mp-modal-backdrop"></div>
        <div class="mp-modal-content">
            <div class="mp-modal-header">
                <div class="mp-modal-title">Detalle del viaje</div>
                <button id="btnCerrarViajeView" class="mp-modal-close" type="button">&#x2715;</button>
            </div>
            <div class="mp-modal-body">
                <div id="viajeViewBody" class="card-clean">Cargando...</div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="fragments/assets :: globalScripts"></th:block>
<script th:src="@{/js/viajes.js(v=20260615)}" defer></script>
</body>
</html>
