<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lotes</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <th:block th:replace="fragments/assets :: globalStyles"></th:block>
    <style>
        body { background: var(--mp-gray-bg); }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--mp-blue-dark);
            margin: 0;
        }
        .card-clean {
            background: var(--mp-white);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--mp-border);
            box-shadow: 0 6px 16px rgba(15, 36, 96, 0.08);
        }
        .filters {
            display: grid;
            grid-template-columns: 1.2fr 220px auto;
            gap: 10px;
            align-items: end;
        }
        @media (max-width: 900px) {
            .filters { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<main class="container mt-5 pt-4">
    <div class="page-header">
        <h1 class="page-title">Lotes</h1>
        <button id="btnNuevoLote" type="button" class="btn btn-primary">Nuevo lote</button>
    </div>

    <section class="card-clean">
        <div class="filters">
            <div>
                <label class="form-label">Buscar</label>
                <input id="filtroBusquedaLotes" type="text" class="form-control" placeholder="Numero de lote, encargado o descripcion...">
            </div>
            <div>
                <label class="form-label">Estado</label>
                <select id="filtroEstadoLotes" class="form-select">
                    <option value="" selected>Todos</option>
                    <option value="en_bodega">En bodega</option>
                    <option value="en_transito">En transito</option>
                    <option value="entregado">Entregado</option>
                    <option value="dañado">Dañado</option>
                    <option value="perdido">Perdido</option>
                    <option value="devuelto">Devuelto</option>
                    <option value="cancelado">Cancelado</option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button id="btnAplicarFiltrosLotes" type="button" class="btn btn-primary">Aplicar</button>
                <button id="btnLimpiarFiltrosLotes" type="button" class="btn btn-outline-secondary">Limpiar</button>
            </div>
        </div>

        <div class="table-responsive mt-3">
            <table class="table mp-table align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Numero</th>
                    <th>Estado</th>
                    <th>Categoria</th>
                    <th>Remitente</th>
                    <th>Destinatario</th>
                    <th>Peso</th>
                    <th>Valor</th>
                    <th>Encargado</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody id="tablaLotesBody">
                <tr><td colspan="10" class="text-center">Cargando lotes...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-2">
            <span id="totalLotes">Mostrando 0 lotes</span>
        </div>
    </section>

    <!-- Modal: Nuevo Lote -->
    <div class="modal fade" id="modalNuevoLote" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content mp-modal-content">
                <div class="modal-header mp-modal-header">
                    <h5 class="modal-title" id="modalNuevoLoteLabel">Nuevo lote</h5>
                    <button type="button" class="btn-close mp-modal-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formNuevoLote" class="row g-3" novalidate>
                        <input type="hidden" id="nuevoLoteId">
                        <div class="col-12 col-md-6">
                            <label class="form-label">Numero de lote</label>
                            <input id="nuevoNumeroLote" type="text" class="form-control" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Estado</label>
                            <select id="nuevoEstadoLote" class="form-select" required>
                                <option value="" selected>Seleccione</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Categoria</label>
                            <div class="d-flex gap-2">
                                <select id="nuevoCategoria" class="form-select" required>
                                    <option value="" selected>Seleccione</option>
                                </select>
                                <button id="btnNuevaCategoria" type="button" class="btn btn-outline-secondary">+</button>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Encargado</label>
                            <input id="nuevoEncargado" type="text" class="form-control">
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label">Cliente remitente</label>
                            <div class="input-group">
                                <input id="nuevoRemitenteQ" type="text" class="form-control" placeholder="Buscar..." autocomplete="off">
                                <button id="btnBuscarRemitente" type="button" class="btn btn-outline-secondary">Buscar</button>
                                <button id="btnIrClientesRemitente" type="button" class="btn btn-outline-secondary">Clientes</button>
                            </div>
                            <select id="nuevoRemitente" class="form-select mt-2" required>
                                <option value="" selected>Seleccione</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6">
                            <label class="form-label">Cliente destinatario</label>
                            <div class="input-group">
                                <input id="nuevoDestinatarioQ" type="text" class="form-control" placeholder="Buscar..." autocomplete="off">
                                <button id="btnBuscarDestinatario" type="button" class="btn btn-outline-secondary">Buscar</button>
                                <button id="btnIrClientesDestinatario" type="button" class="btn btn-outline-secondary">Clientes</button>
                            </div>
                            <select id="nuevoDestinatario" class="form-select mt-2">
                                <option value="" selected>Seleccione</option>
                            </select>
                        </div>

                        <div class="col-12 col-md-4">
                            <label class="form-label">Peso</label>
                            <input id="nuevoPeso" type="number" step="0.01" class="form-control">
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label">Valor declarado</label>
                            <input id="nuevoValor" type="number" step="0.01" class="form-control">
                        </div>
                        <div class="col-12 col-md-4">
                            <label class="form-label">Descripcion</label>
                            <input id="nuevoDescripcion" type="text" class="form-control">
                        </div>

                        <div class="col-12 d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button id="btnGuardarLote" type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                        <div class="col-12">
                            <div id="estadoGuardarLote" class="text-muted small"></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Selector de Cliente (Remitente / Destinatario) -->
    <div class="modal fade" id="modalSeleccionCliente" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content mp-modal-content">
                <div class="modal-header mp-modal-header">
                    <h5 class="modal-title" id="modalSeleccionClienteLabel">Seleccionar cliente</h5>
                    <button type="button" class="btn-close mp-modal-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-2 align-items-end">
                        <div class="col-12 col-md-7">
                            <label class="form-label">Buscar</label>
                            <input id="clientePickerQ" type="text" class="form-control" placeholder="Nombre, telefono, correo...">
                        </div>
                        <div class="col-12 col-md-3">
                            <label class="form-label">Tamano</label>
                            <select id="clientePickerSize" class="form-select">
                                <option value="10" selected>10</option>
                                <option value="25">25</option>
                                <option value="50">50</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-2 d-flex gap-2">
                            <button id="btnClientePickerBuscar" type="button" class="btn btn-primary w-100">Buscar</button>
                        </div>
                    </div>

                    <div class="table-responsive mt-3">
                        <table class="table mp-table align-middle">
                            <thead>
                            <tr>
                                <th style="width: 90px;">Accion</th>
                                <th>Nombre</th>
                                <th>Telefono</th>
                                <th>Correo</th>
                                <th>Direccion</th>
                                <th style="width: 90px;">ID</th>
                            </tr>
                            </thead>
                            <tbody id="clientePickerBody">
                            <tr><td colspan="6" class="text-center">Cargando clientes...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-between align-items-center">
                    <span id="clientePickerInfo" class="text-muted small">Pagina 1 de 1</span>
                    <div class="d-flex gap-2">
                        <button id="clientePickerPrev" type="button" class="btn btn-outline-secondary">Anterior</button>
                        <button id="clientePickerNext" type="button" class="btn btn-outline-secondary">Siguiente</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="fragments/assets :: globalScripts"></th:block>
<script th:src="@{/js/lotes.js}" defer></script>
</body>
</html>
