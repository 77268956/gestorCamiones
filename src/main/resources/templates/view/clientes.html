<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Clientes</title>
    <th:block th:replace="fragments/assets :: globalStyles"></th:block>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div class="page-surface">
        <div class="mp-stripe"></div>

        <div class="mp-toolbar">
            <div class="row align-items-center g-2">
                <div class="col-12 col-md-2">
                    <h5 class="mp-title">Clientes</h5>
                </div>

                <div class="col-12 col-md-6 mp-search">
                    <div class="input-group">
                        <span class="input-group-text">Buscar</span>
                        <input id="filtroBusquedaClientes" type="text" class="form-control" placeholder="Buscar nombre, telefono o DUI/NIT...">
                    </div>
                </div>

                <div class="col-12 col-md-4 d-grid">
                    <button id="btnAbrirModalAgregarCliente" class="btn btn-add" data-bs-toggle="modal" data-bs-target="#modalAgregarCliente">+ Agregar Cliente</button>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table mp-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Telefono</th>
                    <th>DUI/NIT</th>
                    <th>Direccion</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody id="tablaClientes">
                <tr>
                    <td colspan="6" class="text-center">Cargando clientes...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mp-table-footer d-flex flex-wrap justify-content-between align-items-center gap-2">
            <span id="totalClientes">Mostrando 0 clientes</span>
            <div class="d-flex align-items-center gap-2">
                <label for="tamanoPaginaClientes" class="mb-0">Por pagina</label>
                <select id="tamanoPaginaClientes" class="form-select form-select-sm" style="width: 90px;">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
            </div>
            <nav aria-label="Paginacion de clientes">
                <ul id="paginacionClientes" class="pagination pagination-sm mb-0">
                    <li class="page-item disabled">
                        <button id="btnPrevClientes" class="page-link" type="button">Anterior</button>
                    </li>
                    <li class="page-item disabled">
                        <span id="paginaActualClientes" class="page-link">1 / 1</span>
                    </li>
                    <li class="page-item disabled">
                        <button id="btnNextClientes" class="page-link" type="button">Siguiente</button>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAgregarCliente" tabindex="-1" aria-labelledby="modalAgregarClienteLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content mp-modal-content">
            <div class="modal-header mp-modal-header">
                <h5 class="modal-title" id="modalAgregarClienteLabel">Agregar Cliente</h5>
                <button type="button" class="btn-close mp-modal-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form id="formAgregarCliente" class="row g-3">
                    <input type="hidden" id="clienteId">
                    <div class="col-md-6">
                        <label for="clienteNombre" class="form-label">Nombre *</label>
                        <input type="text" class="form-control mp-modal-input" id="clienteNombre" required>
                    </div>
                    <div class="col-md-6">
                        <label for="clienteTelefono" class="form-label">Telefono</label>
                        <input type="text" class="form-control mp-modal-input" id="clienteTelefono">
                    </div>
                    <div class="col-md-6">
                        <label for="clienteDuiNit" class="form-label">DUI/NIT</label>
                        <input type="text" class="form-control mp-modal-input" id="clienteDuiNit">
                    </div>
                    <div class="col-md-6">
                        <label for="clienteDireccion" class="form-label">Direccion</label>
                        <input type="text" class="form-control mp-modal-input" id="clienteDireccion">
                    </div>
                </form>
            </div>

            <div class="modal-footer mp-modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="btnSubmitClienteModal" type="submit" form="formAgregarCliente" class="btn btn-add">Guardar Cliente</button>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="fragments/assets :: globalScripts"></th:block>
<script src="/js/clientes.js"></script>
</body>
</html>
