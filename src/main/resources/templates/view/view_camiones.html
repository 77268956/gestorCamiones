<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Camiones</title>
    <th:block th:replace="fragments/assets :: globalStyles"></th:block>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div class="page-surface">
        <div class="mp-stripe"></div>

        <div class="mp-toolbar">
            <div class="row align-items-center g-2">
                <div class="col-12 col-md-2">
                    <h5 class="mp-title">Camiones</h5>
                </div>

                <div class="col-12 col-md-4 mp-search">
                    <div class="input-group">
                        <span class="input-group-text">Buscar</span>
                        <input id="filtroBusquedaCamiones" type="text" class="form-control" placeholder="Buscar placa, nombre o modelo...">
                    </div>
                </div>

                <div class="col-12 col-md-3">
                    <select id="filtroEstadoCamiones" class="form-select mp-select">
                        <option value="" selected>Todos los estados</option>
                    </select>
                </div>

                <div class="col-12 col-md-3 d-grid">
                    <button id="btnAbrirModalAgregarCamion" class="btn btn-add" data-bs-toggle="modal" data-bs-target="#modalAgregarCamion">+ Agregar Camion</button>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table mp-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Placa</th>
                    <th>Modelo</th>
                    <th>Nombre</th>
                    <th>Precio compra</th>
                    <th>Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody id="tablaCamiones">
                <tr>
                    <td colspan="7" class="text-center">Cargando camiones...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mp-table-footer d-flex flex-wrap justify-content-between align-items-center gap-2">
            <span id="totalCamiones">Mostrando 0 camiones</span>
            <div class="d-flex align-items-center gap-2">
                <label for="tamanoPaginaCamiones" class="mb-0">Por pagina</label>
                <select id="tamanoPaginaCamiones" class="form-select form-select-sm" style="width: 90px;">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
            </div>
            <nav aria-label="Paginacion de camiones">
                <ul id="paginacionCamiones" class="pagination pagination-sm mb-0">
                    <li class="page-item disabled">
                        <button id="btnPrevCamiones" class="page-link" type="button">Anterior</button>
                    </li>
                    <li class="page-item disabled">
                        <span id="paginaActualCamiones" class="page-link">1 / 1</span>
                    </li>
                    <li class="page-item disabled">
                        <button id="btnNextCamiones" class="page-link" type="button">Siguiente</button>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAgregarCamion" tabindex="-1" aria-labelledby="modalAgregarCamionLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content mp-modal-content">
            <div class="modal-header mp-modal-header">
                <h5 class="modal-title" id="modalAgregarCamionLabel">Agregar Nuevo Camion</h5>
                <button type="button" class="btn-close mp-modal-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form id="formAgregarCamion" class="row g-4" enctype="multipart/form-data">
                    <input type="hidden" id="camionId">
                    <div class="col-md-8">
                        <div class="row g-3">
                            <div class="col-12">
                                <h6 class="mp-title-sm mb-2">Informacion del Vehiculo</h6>
                                <hr class="mt-0">
                            </div>

                            <div class="col-md-4">
                                <label for="camionPlaca" class="form-label">Placa *</label>
                                <input type="text" class="form-control mp-modal-input" id="camionPlaca" name="placa" placeholder="P123-456" required>
                            </div>

                            <div class="col-md-4">
                                <label for="camionCodigo" class="form-label">Codigo *</label>
                                <input type="text" class="form-control mp-modal-input" id="camionCodigo" name="codigo" placeholder="COD-101" required>
                            </div>

                            <div class="col-md-4">
                                <label for="camionNombre" class="form-label">Nombre / Alias *</label>
                                <input type="text" class="form-control mp-modal-input" id="camionNombre" name="nombre" placeholder="Unidad 01" required>
                            </div>

                            <div class="col-md-6">
                                <label for="camionModelo" class="form-label">Modelo *</label>
                                <input type="text" class="form-control mp-modal-input" id="camionModelo" name="modelo" placeholder="Volvo FH16 - 2024">
                            </div>

                            <div class="col-md-6">
                                <label for="camionEstado" class="form-label">Estado Operativo *</label>
                                <select id="camionEstado" name="estado" class="form-select mp-modal-input" required>
                                    <option selected disabled value="">Seleccionar...</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="camionPrecioCompra" class="form-label">Precio de compra</label>
                                <input type="number" class="form-control mp-modal-input" id="camionPrecioCompra" name="precioCompra" step="0.01" min="0" placeholder="0.00">
                            </div>

                            <div class="col-12">
                                <label for="camionComentario" class="form-label">Comentarios / Observaciones</label>
                                <textarea id="camionComentario" name="comentario" class="form-control mp-modal-input" rows="4" placeholder="Detalles tecnicos o notas adicionales..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="row g-3">
                            <div class="col-12">
                                <h6 class="mp-title-sm mb-2">Fotografia de la Unidad</h6>
                                <hr class="mt-0">
                            </div>

                            <div class="col-md-12">
                                <div class="sticky-top" style="top: 20px;">
                                    <label class="form-label">Foto del camion</label>
                                    <div class="border rounded p-3 text-center">
                                        <img id="camionImagen" src="https://via.placeholder.com/400x200?text=Sin+Imagen" alt="Foto del camion" class="img-fluid rounded" style="max-height: 180px; width: 100%; object-fit: cover;">
                                        <div class="mt-3">
                                            <button type="button" class="btn btn-sm btn-primary w-100" onclick="document.getElementById('fileInputCamion').click();">
                                                Subir foto
                                            </button>
                                            <input type="file" id="fileInputCamion" class="d-none" accept="image/*">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer mp-modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="btnSubmitCamionModal" type="submit" form="formAgregarCamion" class="btn btn-add">Registrar Camion</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal: Gastos del camion -->
<div class="modal fade" id="modalGastosCamion" tabindex="-1" aria-labelledby="modalGastosCamionLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content mp-modal-content">
            <div class="modal-header mp-modal-header">
                <h5 class="modal-title" id="modalGastosCamionLabel">Gastos del camion</h5>
                <button type="button" class="btn-close mp-modal-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3 align-items-end mb-3">
                    <input type="hidden" id="gastoCamionIdEdit" value="">
                    <div class="col-12 col-md-4">
                        <label class="form-label" for="gastoCamionTipo">Tipo de gasto *</label>
                        <select id="gastoCamionTipo" class="form-select mp-modal-input" required></select>
                    </div>
                    <div class="col-12 col-md-2">
                        <label class="form-label" for="gastoCamionMonto">Monto *</label>
                        <input id="gastoCamionMonto" type="number" class="form-control mp-modal-input" step="0.01" min="0" placeholder="0.00" required>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label" for="gastoCamionFecha">Fecha</label>
                        <input id="gastoCamionFecha" type="date" class="form-control mp-modal-input">
                    </div>
                    <div class="col-12 col-md-3 d-grid">
                        <button id="btnAgregarGastoCamion" type="button" class="btn btn-add">Agregar gasto</button>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="gastoCamionDescripcion">Descripcion</label>
                        <input id="gastoCamionDescripcion" type="text" class="form-control mp-modal-input" placeholder="Ej: Cambio de aceite">
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="gastoCamionEvidencia">Evidencia (archivo)</label>
                        <input id="gastoCamionEvidencia" type="file" class="form-control mp-modal-input" accept="image/*,.pdf">
                    </div>
                    <div class="col-12 d-flex justify-content-end">
                        <button id="btnCancelarEdicionGastoCamion" type="button" class="btn btn-outline-secondary d-none">Cancelar edicion</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table mp-table">
                        <thead>
                        <tr>
                            <th>Tipo</th>
                            <th>Descripcion</th>
                            <th>Monto</th>
                            <th>Fecha</th>
                            <th>Evidencia</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="tablaGastosCamion">
                        <tr><td colspan="6" class="text-center">Cargando gastos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer mp-modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="fragments/assets :: globalScripts"></th:block>
<script src="/js/camion.js"></script>
</body>
</html>
