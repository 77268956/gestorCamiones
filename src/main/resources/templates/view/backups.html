<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Backups</title>
    <th:block th:replace="fragments/assets :: globalStyles"></th:block>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<main class="container mt-5 pt-4">
    <div th:if="${error}" class="alert alert-danger mb-3" role="alert" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success mb-3" role="alert" th:text="${message}"></div>
    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex flex-wrap gap-2 align-items-center justify-content-between">
            <div>
                <h3 class="mb-1">Modulo de Backups</h3>
                <p class="mb-0 text-muted">Copia manual, restauracion y carga de respaldo.</p>
            </div>
            <form th:action="@{/backups/manual}" method="post">
                <button class="btn btn-primary" type="submit">Crear backup manual</button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/backups/subir}" method="post" enctype="multipart/form-data" class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Ingresar backup existente</label>
                    <input type="file" name="archivo" class="form-control" required>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-outline-success w-100" type="submit">Subir backup</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">Historial</div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Origen</th>
                    <th>Estado</th>
                    <th>Creado</th>
                    <th>Ruta interna</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="backup : ${backups}">
                    <td th:text="${backup.id}"></td>
                    <td th:text="${backup.origen}"></td>
                    <td th:text="${backup.estado}"></td>
                    <td th:text="${backup.creadoEn}"></td>
                    <td th:text="${backup.rutaInterna}"></td>
                    <td>
                        <form th:action="@{'/backups/' + ${backup.id} + '/restaurar'}" method="post">
                            <button class="btn btn-sm btn-warning" type="submit">Restaurar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<th:block th:replace="fragments/assets :: globalScripts"></th:block>
</body>
</html>
